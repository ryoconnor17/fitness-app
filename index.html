<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitForge — Your Training OS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0f;
  color: white;
}
.app {
  display: flex;
  height: 100vh;
}
.sidebar {
  width: 80px;
  background: #12121a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}
.logo {
  background: #7c6ef7;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}
.main {
  flex: 1;
  padding: 30px;
}
.section {
  display: none;
}
.section.active {
  display: block;
}
button {
  cursor: pointer;
}
.chat-msg {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">FF</div>
    <button onclick="nav('dashboard')">🏠</button>
    <button onclick="nav('coach')">🤖</button>
  </div>

  <div class="main">
    <div id="dashboard" class="section active">
      <h1>Dashboard</h1>
      <p>Your fitness app is running 🚀</p>
    </div>

    <div id="coach" class="section">
      <h1>AI Coach</h1>
      <div id="chat"></div>

      <input id="input" placeholder="Ask something..." />
      <button onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
function nav(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let chatHistory = [];

function sendChat() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMessage("You: " + text);
  input.value = "";

  // Fake AI response (safe for frontend)
  setTimeout(() => {
    addMessage("AI: Stay consistent, progressive overload wins 💪");
  }, 500);
}

function addMessage(text) {
  const div = document.createElement('div');
  div.className = "chat-msg";
  div.textContent = text;
  document.getElementById('chat').appendChild(div);
}
</script>

</body>
</html>
